<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="body" cx="50%" cy="38%" r="50%">
      <stop offset="0%" stop-color="#6a5530"/>
      <stop offset="60%" stop-color="#3a2e10"/>
      <stop offset="100%" stop-color="#181200"/>
    </radialGradient>
    <radialGradient id="face" cx="45%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#ffd080"/>
      <stop offset="40%" stop-color="#c87800"/>
      <stop offset="100%" stop-color="#603800"/>
    </radialGradient>
    <radialGradient id="gloss" cx="50%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>
  <circle cx="32" cy="32" r="30" fill="#000" opacity="0.4" filter="url(#shadow)"/>
  <circle cx="32" cy="32" r="30" fill="url(#body)" stroke="#100800" stroke-width="1"/>
  <circle cx="32" cy="32" r="24" fill="url(#face)"/>
  <!-- Monitor/display with chip - Graphics settings -->
  <rect x="17" y="20" width="30" height="20" rx="2.5" fill="none" stroke="#fff" stroke-width="2.2"/>
  <line x1="27" y1="40" x2="27" y2="45" stroke="#fff" stroke-width="2"/>
  <line x1="37" y1="40" x2="37" y2="45" stroke="#fff" stroke-width="2"/>
  <line x1="23" y1="45" x2="41" y2="45" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <!-- GPU chip icon inside screen -->
  <rect x="24" y="24" width="16" height="12" rx="1.5" fill="none" stroke="#fff" stroke-width="1.6"/>
  <line x1="27" y1="24" x2="27" y2="22" stroke="#fff" stroke-width="1.4"/>
  <line x1="30" y1="24" x2="30" y2="22" stroke="#fff" stroke-width="1.4"/>
  <line x1="33" y1="24" x2="33" y2="22" stroke="#fff" stroke-width="1.4"/>
  <line x1="36" y1="24" x2="36" y2="22" stroke="#fff" stroke-width="1.4"/>
  <ellipse cx="32" cy="22" rx="16" ry="10" fill="url(#gloss)"/>
</svg>
