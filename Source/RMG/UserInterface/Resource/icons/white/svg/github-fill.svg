<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Soft drop shadow under button -->
    <filter id="ds" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.6"/>
      <feOffset dx="0" dy="1.8"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.6"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft blur for gloss -->
    <filter id="gb" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.6"/>
    </filter>

    <!-- Sharper blur for specular spot -->
    <filter id="sb" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>

    <!-- Symbol drop shadow -->
    <filter id="ss" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.5"/>
      <feOffset dx="0" dy="0.7"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Silver metallic rim: linear gradient bright top -> dark bottom -->
    <linearGradient id="cr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="20%" stop-color="#f4f4f4"/>
      <stop offset="45%" stop-color="#bcbcbc"/>
      <stop offset="55%" stop-color="#6e6e6e"/>
      <stop offset="80%" stop-color="#4a4a4a"/>
      <stop offset="100%" stop-color="#a8a8a8"/>
    </linearGradient>

    <!-- Bright top arc reflection on rim -->
    <linearGradient id="ct" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Dark bottom arc reflection on rim -->
    <linearGradient id="cb" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%"  stop-color="#1a1a1a" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#1a1a1a" stop-opacity="0"/>
    </linearGradient>

    <!-- Colored disc: vertical gradient (light top -> main -> dark bottom) -->
    <linearGradient id="cd" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#5a5a5a"/>
      <stop offset="50%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>

    <!-- Radial overlay for sphere-like 3D curvature -->
    <radialGradient id="cs" cx="0.35" cy="0.3" r="0.85">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.4"/>
    </radialGradient>

    <!-- Clip path so gloss stays inside the colored disc -->
    <clipPath id="dc">
      <circle cx="32" cy="32" r="26"/>
    </clipPath>

    <!-- Clip path for chrome rim ring (~3.5px wide band) -->
    <clipPath id="rc">
      <path d="M32,3 A29,29 0 1,1 32,61 A29,29 0 1,1 32,3 Z M32,6.5 A25.5,25.5 0 1,0 32,57.5 A25.5,25.5 0 1,0 32,6.5 Z" fill-rule="evenodd"/>
    </clipPath>
  </defs>

  <!-- 1. Drop shadow under button -->
  <ellipse cx="32" cy="34" rx="28" ry="28" fill="#000000" opacity="0.42" filter="url(#ds)"/>

  <!-- 2. Silver metallic rim (~3.5px wide band) -->
  <circle cx="32" cy="32" r="29" fill="url(#cr)"/>
  <!-- Chrome specular highlights on rim -->
  <g clip-path="url(#rc)">
    <!-- Bright top arc reflection -->
    <ellipse cx="32" cy="3.5" rx="28" ry="10" fill="url(#ct)" opacity="1"/>
    <!-- Dark bottom arc reflection -->
    <ellipse cx="32" cy="60.5" rx="28" ry="8" fill="url(#cb)" opacity="0.98"/>
    <!-- Sharp horizontal bright streak at top of rim -->
    <ellipse cx="32" cy="4.5" rx="24" ry="1.6" fill="#ffffff" opacity="1"/>
    <!-- Sharp horizontal dark streak at bottom of rim -->
    <ellipse cx="32" cy="59.5" rx="24" ry="1.3" fill="#000000" opacity="0.7"/>
    <!-- Subtle horizontal highlight in middle of rim -->
    <ellipse cx="32" cy="32" rx="29" ry="0.8" fill="#ffffff" opacity="0.3"/>
  </g>

  <!-- 3. Sharp dark ring between rim and disc (clear boundary) -->
  <circle cx="32" cy="32" r="26.2" fill="none" stroke="#0a0a0a" stroke-width="0.7" opacity="0.9"/>
  <!-- Inner highlight ring (top edge of colored disc, "embossed inset" effect) -->
  <circle cx="32" cy="32" r="25.8" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.5"/>

  <!-- 4. Colored disc -->
  <circle cx="32" cy="32" r="26" fill="url(#cd)"/>
  <!-- 4b. Radial sphere-like curvature overlay -->
  <circle cx="32" cy="32" r="26" fill="url(#cs)"/>

  <!-- 5. Glossy highlights (clipped to disc) - TWO bright highlights per reference -->
  <g clip-path="url(#dc)">
    <!-- MAIN highlight: large soft top-left glossy reflection -->
    <ellipse cx="24" cy="15" rx="22" ry="12" fill="#ffffff" opacity="0.6" filter="url(#gb)"/>
    <!-- MAIN sharp specular spot upper-left (bright, visible) -->
    <ellipse cx="21" cy="13" rx="11" ry="6" fill="#ffffff" opacity="0.9" filter="url(#sb)"/>
    <!-- Tiny bright dot for extra realism -->
    <ellipse cx="19" cy="12" rx="4" ry="2" fill="#ffffff" opacity="1" filter="url(#sb)"/>
    <!-- SECONDARY highlight bottom-right (per reference: weaker, rounder) -->
    <ellipse cx="42" cy="46" rx="8" ry="5" fill="#ffffff" opacity="0.45" filter="url(#gb)"/>
    <ellipse cx="44" cy="45" rx="3" ry="1.5" fill="#ffffff" opacity="0.7" filter="url(#sb)"/>
    <!-- Bottom inner shadow (button looks "inset" at bottom edge) -->
    <ellipse cx="32" cy="51" rx="25" ry="10" fill="#000000" opacity="0.4" filter="url(#gb)"/>
  </g>

  <!-- 6. Inner subtle ring (dark contour of colored disc) -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="#000000" stroke-width="0.4" opacity="0.4"/>

  <!-- 7. Symbol with shadow -->
  <g filter="url(#ss)">
    <g fill="#ffffff">
        <path d="M32,15 A17,17 0 0,0 26.4,48 C27,48.1 27.2,47.6 27.2,47.2 L27.2,44 C22,45.1 21,41.5 21,41.5 C20.2,39.5 19,39 19,39 C17.4,37.9 19.1,37.9 19.1,37.9 C20.9,38 21.8,39.7 21.8,39.7 C23.4,42.4 25.9,41.6 27,41.2 C27.2,40 27.7,39.3 28.2,38.8 C24.3,38.4 20.2,36.9 20.2,30 C20.2,28.1 20.9,26.6 22,25.4 C21.8,24.9 21.2,23.2 22.2,20.9 C22.2,20.9 23.6,20.5 27.2,22.8 C28.7,22.4 30.3,22.2 32,22.2 C33.7,22.2 35.3,22.4 36.8,22.8 C40.4,20.5 41.8,20.9 41.8,20.9 C42.8,23.2 42.2,24.9 42,25.4 C43.1,26.6 43.8,28.1 43.8,30 C43.8,36.9 39.7,38.4 35.8,38.8 C36.4,39.4 37,40.5 37,42.3 L37,47.2 C37,47.6 37.2,48.1 37.8,48 A17,17 0 0,0 32,15 Z"/>
    </g>
  </g>
</svg>