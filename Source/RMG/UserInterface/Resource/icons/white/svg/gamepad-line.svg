<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="ds" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5"/>
      <feOffset dx="0" dy="1.6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="gb" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    <filter id="sb" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
    <filter id="ss" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.5"/>
      <feOffset dx="0" dy="0.7"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="cr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="20%" stop-color="#f4f4f4"/>
      <stop offset="45%" stop-color="#bcbcbc"/>
      <stop offset="55%" stop-color="#6e6e6e"/>
      <stop offset="80%" stop-color="#4a4a4a"/>
      <stop offset="100%" stop-color="#a8a8a8"/>
    </linearGradient>
    <linearGradient id="ct" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cb" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%"  stop-color="#1a1a1a" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#1a1a1a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cd" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#5be07a"/>
      <stop offset="50%" stop-color="#0fa84a"/>
      <stop offset="100%" stop-color="#063a18"/>
    </linearGradient>
    <radialGradient id="cs" cx="0.35" cy="0.3" r="0.85">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.4"/>
    </radialGradient>
    <clipPath id="dc">
      <circle cx="32" cy="32" r="26"/>
    </clipPath>
    <clipPath id="rc">
      <path d="M32,3 A29,29 0 1,1 32,61 A29,29 0 1,1 32,3 Z M32,6.5 A25.5,25.5 0 1,0 32,57.5 A25.5,25.5 0 1,0 32,6.5 Z" fill-rule="evenodd"/>
    </clipPath>
  </defs>

  <circle cx="32" cy="33.5" r="28" fill="#000000" opacity="0.42" filter="url(#ds)"/>
  <circle cx="32" cy="32" r="29" fill="url(#cr)"/>
  <g clip-path="url(#rc)">
    <ellipse cx="32" cy="3.5" rx="28" ry="10" fill="url(#ct)" opacity="1"/>
    <ellipse cx="32" cy="60.5" rx="28" ry="8" fill="url(#cb)" opacity="0.98"/>
    <ellipse cx="32" cy="4.5" rx="24" ry="1.6" fill="#ffffff" opacity="1"/>
    <ellipse cx="32" cy="59.5" rx="24" ry="1.3" fill="#000000" opacity="0.7"/>
    <ellipse cx="32" cy="32" rx="29" ry="0.8" fill="#ffffff" opacity="0.3"/>
  </g>
  <circle cx="32" cy="32" r="26.2" fill="none" stroke="#0a0a0a" stroke-width="0.7" opacity="0.9"/>
  <circle cx="32" cy="32" r="25.8" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.5"/>
  <circle cx="32" cy="32" r="26" fill="url(#cd)"/>
  <circle cx="32" cy="32" r="26" fill="url(#cs)"/>
  <g clip-path="url(#dc)">
    <ellipse cx="24" cy="15" rx="22" ry="12" fill="#ffffff" opacity="0.55" filter="url(#gb)"/>
    <ellipse cx="21" cy="13" rx="11" ry="6" fill="#ffffff" opacity="0.85" filter="url(#sb)"/>
    <ellipse cx="42" cy="46" rx="8" ry="5" fill="#ffffff" opacity="0.4" filter="url(#gb)"/>
    <ellipse cx="44" cy="45" rx="3" ry="1.5" fill="#ffffff" opacity="0.65" filter="url(#sb)"/>
    <ellipse cx="32" cy="51" rx="25" ry="10" fill="#000000" opacity="0.38" filter="url(#gb)"/>
  </g>
  <circle cx="32" cy="32" r="26" fill="none" stroke="#000000" stroke-width="0.4" opacity="0.4"/>

  <g filter="url(#ss)">
    <!--
      N64 controller silhouette: iconic 3-handle "M" shape.
      Main body at top, 3 handles hanging down.
      Left handle: D-pad
      Center handle: analog stick + Start button  
      Right handle: C-buttons + A/B buttons
      Scale: fits within r=26 disc at (32,32), so roughly 10..54 x 10..58
    -->

    <!-- Controller main body + 3 handles as one shape -->
    <!-- Body: wide rounded rectangle -->
    <rect x="10" y="17" width="44" height="16" rx="5" fill="#d8d8d8" stroke="#5a5a5a" stroke-width="0.8"/>

    <!-- Left handle -->
    <rect x="10" y="29" width="11" height="18" rx="4" fill="#d8d8d8" stroke="#5a5a5a" stroke-width="0.8"/>

    <!-- Center handle (tallest) -->
    <rect x="26" y="29" width="12" height="22" rx="4" fill="#d8d8d8" stroke="#5a5a5a" stroke-width="0.8"/>

    <!-- Right handle -->
    <rect x="43" y="29" width="11" height="18" rx="4" fill="#d8d8d8" stroke="#5a5a5a" stroke-width="0.8"/>

    <!-- Cover the top seams between handles -->
    <rect x="10" y="17" width="44" height="16" rx="5" fill="#d8d8d8"/>
    <rect x="10" y="17" width="44" height="16" rx="5" fill="none" stroke="#5a5a5a" stroke-width="0.8"/>

    <!-- V-gap left: between left and center handle -->
    <polygon points="21,33 26,33 26,37 23.5,35" fill="#0fa84a"/>

    <!-- V-gap right: between center and right handle -->
    <polygon points="38,33 43,33 40.5,35 38,37" fill="#0fa84a"/>

    <!-- Top shading for 3D depth -->
    <rect x="10" y="17" width="44" height="5" rx="5" fill="#ffffff" opacity="0.25"/>

    <!-- D-Pad on left handle -->
    <rect x="13" y="31" width="5" height="1.8" rx="0.4" fill="#4a4a4a"/>
    <rect x="14.9" y="29.1" width="1.8" height="5" rx="0.4" fill="#4a4a4a"/>

    <!-- Analog Stick on center handle -->
    <circle cx="32" cy="31" r="3" fill="#2a2a2a" stroke="#1a1a1a" stroke-width="0.3"/>
    <circle cx="32" cy="31" r="2.1" fill="#4a4a4a"/>
    <circle cx="31.3" cy="30.3" r="0.85" fill="#ffffff" opacity="0.75"/>

    <!-- Start button on center handle (red oval) -->
    <ellipse cx="32" cy="41" rx="3" ry="1.8" fill="#cc2222" stroke="#7a0000" stroke-width="0.3"/>
    <ellipse cx="32" cy="40.5" rx="2.2" ry="0.65" fill="#ff6666" opacity="0.65"/>

    <!-- C-buttons 2x2 yellow on right handle -->
    <circle cx="46.5" cy="29.5" r="1.7" fill="#f5c518" stroke="#a08000" stroke-width="0.3"/>
    <circle cx="50" cy="29.5" r="1.7" fill="#f5c518" stroke="#a08000" stroke-width="0.3"/>
    <circle cx="46.5" cy="33" r="1.7" fill="#f5c518" stroke="#a08000" stroke-width="0.3"/>
    <circle cx="50" cy="33" r="1.7" fill="#f5c518" stroke="#a08000" stroke-width="0.3"/>
    <!-- highlights on C-buttons -->
    <circle cx="46" cy="29" r="0.6" fill="#ffe680" opacity="0.85"/>
    <circle cx="49.5" cy="29" r="0.6" fill="#ffe680" opacity="0.85"/>
    <circle cx="46" cy="32.5" r="0.6" fill="#ffe680" opacity="0.85"/>
    <circle cx="49.5" cy="32.5" r="0.6" fill="#ffe680" opacity="0.85"/>

    <!-- A button (blue) -->
    <circle cx="50" cy="38" r="2.2" fill="#1e6cd6" stroke="#06245a" stroke-width="0.3"/>
    <circle cx="49.4" cy="37.4" r="0.85" fill="#5aa0ff" opacity="0.85"/>

    <!-- B button (green, slightly larger) -->
    <circle cx="45.5" cy="39.5" r="2.5" fill="#0fa84a" stroke="#063a18" stroke-width="0.3"/>
    <circle cx="44.9" cy="38.9" r="1" fill="#5be07a" opacity="0.85"/>

    <!-- Z trigger hint on bottom of body -->
    <rect x="21" y="32" width="22" height="2.5" rx="1" fill="#888888" opacity="0.5"/>
    <rect x="23" y="32" width="18" height="1" rx="0.5" fill="#ffffff" opacity="0.3"/>
  </g>
</svg>
