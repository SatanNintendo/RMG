<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Outer button body gradient: dark metal ring -->
    <radialGradient id="body" cx="50%" cy="38%" r="50%">
      <stop offset="0%" stop-color="#5a6a7a"/>
      <stop offset="60%" stop-color="#2a3540"/>
      <stop offset="100%" stop-color="#111820"/>
    </radialGradient>
    <!-- Inner face: teal/green color -->
    <radialGradient id="face" cx="45%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#7aeacc"/>
      <stop offset="40%" stop-color="#20b080"/>
      <stop offset="100%" stop-color="#0a5a40"/>
    </radialGradient>
    <!-- Gloss highlight -->
    <radialGradient id="gloss" cx="50%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>
  <!-- Outer ring shadow -->
  <circle cx="32" cy="32" r="30" fill="#000" opacity="0.4" filter="url(#shadow)"/>
  <!-- Outer metal ring -->
  <circle cx="32" cy="32" r="30" fill="url(#body)" stroke="#0a1018" stroke-width="1"/>
  <!-- Inner colored face -->
  <circle cx="32" cy="32" r="24" fill="url(#face)"/>
  <!-- Icon: ROM file -->
  <g transform="translate(20, 17)">
    <rect x="2" y="0" width="16" height="20" rx="2" fill="none" stroke="#fff" stroke-width="2.2"/>
    <polyline points="10,0 10,6 16,6" fill="none" stroke="#fff" stroke-width="2.2"/>
    <line x1="5" y1="10" x2="13" y2="10" stroke="#fff" stroke-width="1.8"/>
    <line x1="5" y1="13" x2="13" y2="13" stroke="#fff" stroke-width="1.8"/>
    <line x1="5" y1="16" x2="10" y2="16" stroke="#fff" stroke-width="1.8"/>
  </g>
  <!-- Gloss overlay -->
  <ellipse cx="32" cy="22" rx="16" ry="10" fill="url(#gloss)"/>
</svg>
